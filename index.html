<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold text-gray-800">AI News Feed</h1>
            <p id="last-updated" class="text-gray-500 mt-2">Last Updated: Loading...</p>
            <button onclick="fetchNews()" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">Refresh Now</button>
        </div>

        <div class="flex flex-wrap justify-center gap-4 mb-8 bg-white p-4 rounded shadow-sm" id="filters">
            <label class="font-medium text-blue-800 bg-blue-100 px-3 py-1 rounded cursor-pointer">
                <input type="checkbox" value="Science" checked class="mr-1 filter-checkbox"> Science
            </label>
            <label class="font-medium text-green-800 bg-green-100 px-3 py-1 rounded cursor-pointer">
                <input type="checkbox" value="Environment" checked class="mr-1 filter-checkbox"> Environment
            </label>
            <label class="font-medium text-gray-800 bg-gray-200 px-3 py-1 rounded cursor-pointer">
                <input type="checkbox" value="International Relations" checked class="mr-1 filter-checkbox"> International
            </label>
            <label class="font-medium text-black bg-gray-300 px-3 py-1 rounded cursor-pointer">
                <input type="checkbox" value="Technology" checked class="mr-1 filter-checkbox"> Technology
            </label>
            <label class="font-medium text-yellow-800 bg-yellow-100 px-3 py-1 rounded cursor-pointer">
                <input type="checkbox" value="Business" checked class="mr-1 filter-checkbox"> Business
            </label>
        </div>

        <div id="news-container" class="space-y-6">
            </div>
    </div>

    <script>
        let allArticles = []; 

        // Color mapping dictionary based on your request
        const categoryColors = {
            "Science": { border: "border-blue-500", badge: "bg-blue-100 text-blue-800" },
            "Environment": { border: "border-green-500", badge: "bg-green-100 text-green-800" },
            "International Relations": { border: "border-gray-500", badge: "bg-gray-200 text-gray-800" },
            "Technology": { border: "border-black", badge: "bg-gray-300 text-black" },
            "Business": { border: "border-yellow-500", badge: "bg-yellow-100 text-yellow-800" },
            "General": { border: "border-blue-500", badge: "bg-gray-200 text-gray-800" } // Fallback
        };

        async function fetchNews() {
            const container = document.getElementById('news-container');
            const timestamp = document.getElementById('last-updated');
            
            container.innerHTML = '<p class="text-center text-gray-500">Fetching latest AI insights...</p>';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/news');
                allArticles = await response.json();
                
                const now = new Date().toLocaleTimeString();
                timestamp.innerText = `Last Updated: ${now}`;

                renderArticles();
                
            } catch (error) {
                console.error("Error fetching news:", error);
                container.innerHTML = '<p class="text-center text-red-500">Error: Could not connect to API. Is the server running?</p>';
            }
        }

        function renderArticles() {
            const container = document.getElementById('news-container');
            container.innerHTML = ''; 

            const checkboxes = document.querySelectorAll('.filter-checkbox:checked');
            const checkedCategories = Array.from(checkboxes).map(cb => cb.value);

            const filteredArticles = allArticles.filter(article => checkedCategories.includes(article.category));

            if (filteredArticles.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">No articles match the selected categories.</p>';
                return;
            }

            filteredArticles.forEach(article => {
                const shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(article.source_url)}`;
                const cat = article.category || "General"; 
                
                // Get the colors for this specific category, or use General if it's missing
                const colors = categoryColors[cat] || categoryColors["General"];
                
                const card = `
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 ${colors.border} relative">
                        <span class="absolute top-4 right-4 ${colors.badge} text-xs px-2 py-1 rounded font-semibold uppercase tracking-wide">${cat}</span>
                        <h2 class="text-2xl font-semibold text-gray-900 pr-24">${article.title}</h2>
                        <p class="text-gray-600 mt-2">${article.summary}</p>
                        <div class="mt-4 flex flex-wrap gap-2">
                            ${article.tags.map(tag => `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${tag}</span>`).join('')}
                        </div>
                        <div class="mt-4 flex gap-4">
                            <a href="${article.source_url}" target="_blank" class="text-blue-500 hover:underline">Read more →</a>
                            <a href="${shareUrl}" target="_blank" class="text-green-600 hover:underline font-medium">Share to LinkedIn</a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        document.querySelectorAll('.filter-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', renderArticles);
        });
        
        fetchNews();
        setInterval(fetchNews, 60000);
    </script>
</body>
</html>
